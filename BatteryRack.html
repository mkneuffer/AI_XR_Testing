<!doctype html>
<html lang="en">
  <head>
    <title>Modular Mixed Reality Lab | XR Blocks</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <link type="text/css" rel="stylesheet" href="https://xrblocks.github.io/css/xr.css" />
    <script>
      window.litDisableBundleWarning = true;
    </script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/",
          "troika-three-text": "https://cdn.jsdelivr.net/gh/protectwise/troika@028b81cf308f0f22e5aa8e78196be56ec1997af5/packages/troika-three-text/src/index.js",
          "troika-three-utils": "https://cdn.jsdelivr.net/gh/protectwise/troika@v0.52.4/packages/troika-three-utils/src/index.js",
          "troika-worker-utils": "https://cdn.jsdelivr.net/gh/protectwise/troika@v0.52.4/packages/troika-worker-utils/src/index.js",
          "bidi-js": "https://esm.sh/bidi-js@%5E1.0.2?target=es2022",
          "webgl-sdf-generator": "https://esm.sh/webgl-sdf-generator@1.1.1/es2022/webgl-sdf-generator.mjs",
          "lit": "https://cdn.jsdelivr.net/gh/lit/dist@3/core/lit-core.min.js",
          "lit/": "https://esm.run/lit@3/",
          "xrblocks": "https://cdn.jsdelivr.net/npm/xrblocks@0.11.0/build/xrblocks.js",
          "xrblocks/addons/": "https://cdn.jsdelivr.net/npm/xrblocks@0.11.0/build/addons/"
        }
      }
    </script>
  </head>
  <body>
    <script type="module">
      import 'xrblocks/addons/simulator/SimulatorAddons.js';
      import * as THREE from 'three';
      import * as xb from 'xrblocks';

      /**
       * Modular Mixed Reality Battery Lab.
       * Fully supports physical controllers, dynamic grabbing, and room-scale placement.
       */
      class BatteryLabScript extends xb.Script {
        constructor() {
          super();
          this.terminals = [];
          this.jumpers = [];
          
          // Interaction States
          this.grabbingClip = null;
          this.grabbingUnit = null; 
          
          this.nodeVoltages = new Map();
          this.panelOpen = false;
          this.switchOn = false;
          
          // Refs
          this.panelDoor = null;
          this.switchLever = null;
          this.meterDisplay = null;
          this.probes = { left: null, right: null };
          
          this.clickables = [];
          this.grabbables = []; 
        }

        async init() {
          // Mixed Reality Lighting
          this.add(new THREE.HemisphereLight(0xffffff, 0xbbbbbb, 2));
          const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
          dirLight.position.set(5, 10, 5);
          this.add(dirLight);

          // Create equipment as independent modular units
          this.createModularRack(new THREE.Vector3(-1, 0, -1.2));
          this.createModularPanel(new THREE.Vector3(1, 0.8, -1.0));
          this.createModularMultimeter(new THREE.Vector3(0.3, 0.8, -0.6));
          this.createJumperBin(new THREE.Vector3(-0.3, 0.8, -0.6));
          
          this.setupHandProbes();
          this.solveCircuit();

          // Standard XR visual indicators for environment
          xb.showReticleOnDepthMesh(true);
        }

        /** Safety utility for filtering interaction targets */
        _getValidTargets(arr) {
          return (arr || []).filter(obj => obj && obj.isObject3D && obj.visible);
        }

        createModularRack(pos) {
          const group = new THREE.Group();
          group.position.copy(pos);
          group.userData.isUnit = true;
          this.add(group);

          const rackWidth = 3.5, rackHeight = 1.6, rackDepth = 0.5;
          const frameMat = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.8 });
          
          const postGeom = new THREE.BoxGeometry(0.06, rackHeight, 0.06);
          [[-1.7, 0.8, 0.2], [1.7, 0.8, 0.2], [-1.7, 0.8, -0.2], [1.7, 0.8, -0.2]].forEach(p => {
            const m = new THREE.Mesh(postGeom, frameMat.clone());
            m.position.set(...p);
            group.add(m);
            this.grabbables.push(m);
          });

          [0.05, 0.8].forEach(y => {
            const s = new THREE.Mesh(new THREE.BoxGeometry(rackWidth, 0.04, rackDepth), frameMat.clone());
            s.position.y = y;
            group.add(s);
            this.grabbables.push(s); // Shelves are also grabbable
          });

          let idx = 0;
          [0.22, 0.97].forEach(y => {
            for(let i=0; i<10; i++) {
              this.addBattery(group, -1.5 + (i * 0.33), y, idx++);
            }
          });
        }

        addBattery(parent, x, y, index) {
          const b = new THREE.Group();
          b.position.set(x, y, 0);
          b.add(new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.25, 0.4), new THREE.MeshStandardMaterial({ color: 0x0a0a0a })));

          const tNeg = this.createTerminal(0x222222, `B${index}-`, index);
          tNeg.position.set(-0.08, 0.13, 0.1);
          b.add(tNeg);
          
          const tPos = this.createTerminal(0x880000, `B${index}+`, index);
          tPos.position.set(0.08, 0.13, 0.1);
          b.add(tPos);

          tNeg.userData.peer = tPos;
          tPos.userData.peer = tNeg;

          this.terminals.push(tNeg, tPos);
          parent.add(b);
          if (index === 0) tNeg.userData.isGround = true;
        }

        createModularPanel(pos) {
          const group = new THREE.Group();
          group.position.copy(pos);
          group.userData.isUnit = true;
          this.add(group);

          const box = new THREE.Mesh(
            new THREE.BoxGeometry(0.6, 0.8, 0.3), 
            new THREE.MeshStandardMaterial({ color: 0x555555, metalness: 0.5 })
          );
          group.add(box);
          this.grabbables.push(box);

          const doorGroup = new THREE.Group();
          doorGroup.position.set(-0.3, 0, 0.15);
          this.panelDoor = doorGroup;
          const doorMesh = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.8, 0.02), new THREE.MeshStandardMaterial({ color: 0x666666 }));
          doorMesh.position.set(0.3, 0, 0);
          doorGroup.add(doorMesh);
          
          const handle = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.1, 0.05), new THREE.MeshStandardMaterial({ color: 0x222222 }));
          handle.position.set(0.55, 0, 0.02);
          handle.userData.isDoor = true;
          doorGroup.add(handle);
          this.clickables.push(handle);
          group.add(doorGroup);

          const leverBase = new THREE.Group();
          leverBase.position.set(0, 0.1, 0);
          group.add(leverBase);
          const handleBar = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.2, 0.04), new THREE.MeshStandardMaterial({ color: 0xaa0000 }));
          handleBar.position.y = 0.1;
          const leverGroup = new THREE.Group();
          leverGroup.add(handleBar);
          leverGroup.rotation.x = Math.PI / 4;
          leverGroup.userData.isSwitch = true;
          leverBase.add(leverGroup);
          this.switchLever = leverGroup;
          this.clickables.push(handleBar);

          this.tInPos = this.createTerminal(0xcc0000, "PANEL-IN+", -1);
          this.tInPos.position.set(-0.15, -0.2, 0.05);
          group.add(this.tInPos);
          this.terminals.push(this.tInPos);

          this.tInNeg = this.createTerminal(0x222222, "PANEL-IN-", -1);
          this.tInNeg.position.set(-0.15, -0.3, 0.05);
          group.add(this.tInNeg);
          this.terminals.push(this.tInNeg);

          this.tOutPos = this.createTerminal(0xcc0000, "PANEL-OUT+", -1);
          this.tOutPos.position.set(0.15, -0.2, 0.05);
          group.add(this.tOutPos);
          this.terminals.push(this.tOutPos);

          this.tOutNeg = this.createTerminal(0x222222, "PANEL-OUT-", -1);
          this.tOutNeg.position.set(0.15, -0.3, 0.05);
          group.add(this.tOutNeg);
          this.terminals.push(this.tOutNeg);
        }

        createModularMultimeter(pos) {
          const group = new THREE.Group();
          group.position.copy(pos);
          group.userData.isUnit = true;
          this.add(group);

          const body = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.1, 0.4), new THREE.MeshStandardMaterial({color: 0xffaa00}));
          group.add(body);
          this.grabbables.push(body);

          const screen = new xb.SpatialPanel({ width: 0.25, height: 0.15, backgroundColor: '#050a05' });
          screen.position.set(0, 0.051, 0.05); screen.rotation.x = -Math.PI/2;
          group.add(screen);
          this.meterDisplay = screen.addGrid().addRow().addText({ text: '0.00 V', fontSize: 0.06, fontColor: '#55ff55' });
        }

        createJumperBin(pos) {
          const group = new THREE.Group();
          group.position.copy(pos);
          group.userData.isUnit = true;
          this.add(group);

          const box = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.1, 0.6), new THREE.MeshStandardMaterial({color: 0x222222}));
          group.add(box);
          this.grabbables.push(box);

          for(let i=0; i<12; i++) {
            const jumper = this.createJumper();
            jumper.clipA.position.set(-0.3 + (i*0.06), 0.1, -0.1);
            jumper.clipB.position.set(-0.3 + (i*0.06), 0.1, 0.1);
            group.add(jumper.group);
            this.jumpers.push(jumper);
          }
        }

        createTerminal(color, id, batteryIdx) {
          const t = new THREE.Mesh(
            new THREE.CylinderGeometry(0.015, 0.02, 0.04, 12),
            new THREE.MeshStandardMaterial({ color: color, emissive: color, emissiveIntensity: 0.1 })
          );
          t.userData = { id, batteryIdx, isPos: id.includes('+'), connections: [] };
          t.updateMatrixWorld(true);
          return t;
        }

        createJumper() {
          const group = new THREE.Group();
          const clipGeom = new THREE.BoxGeometry(0.04, 0.04, 0.08);
          const clipMat = new THREE.MeshStandardMaterial({ color: 0xccaa00 });
          const clipA = new THREE.Mesh(clipGeom, clipMat.clone());
          const clipB = new THREE.Mesh(clipGeom, clipMat.clone());
          group.add(clipA, clipB);
          const curve = new THREE.CatmullRomCurve3([clipA.position, clipB.position]);
          const tubeGeom = new THREE.TubeGeometry(curve, 10, 0.005, 8, false);
          const tube = new THREE.Mesh(tubeGeom, new THREE.MeshBasicMaterial({ color: 0x333333 }));
          group.add(tube);
          return { group, clipA, clipB, tube, attachedA: null, attachedB: null };
        }

        setupHandProbes() {
          const create = (color) => {
            const g = new THREE.Group();
            
            // Base handle (Grip portion)
            const handleGeom = new THREE.CylinderGeometry(0.012, 0.015, 0.12, 16);
            const handleMat = new THREE.MeshStandardMaterial({color: color, roughness: 0.6});
            const handle = new THREE.Mesh(handleGeom, handleMat);
            handle.rotation.x = Math.PI / 2;
            handle.position.z = -0.06; // Shifted out of controller
            g.add(handle);
            
            // Finger Guard
            const guardGeom = new THREE.CylinderGeometry(0.018, 0.018, 0.01, 16);
            const guard = new THREE.Mesh(guardGeom, handleMat);
            guard.rotation.x = Math.PI / 2;
            guard.position.z = -0.12;
            g.add(guard);

            // Metal Contact Needle
            const needleGeom = new THREE.CylinderGeometry(0.001, 0.003, 0.06, 8);
            const needleMat = new THREE.MeshStandardMaterial({color: 0xcccccc, metalness: 1.0, roughness: 0.2});
            const needle = new THREE.Mesh(needleGeom, needleMat);
            needle.rotation.x = Math.PI / 2;
            needle.position.z = -0.155; 
            g.add(needle);

            return g;
          };
          
          this.probes.left = create(0x222222);  // COM (Black)
          this.probes.right = create(0xcc0000); // VΩmA (Red)
        }

        solveCircuit() {
          this.nodeVoltages.clear();
          const validTerminals = this._getValidTargets(this.terminals);
          const ground = validTerminals.find(t => t.userData.isGround);
          if (!ground) return;

          const queue = [{ node: ground, voltage: 0 }];
          const visited = new Set();

          while(queue.length > 0) {
            const { node, voltage } = queue.shift();
            if (visited.has(node)) continue;
            visited.add(node);
            this.nodeVoltages.set(node, voltage);

            const peer = node.userData.peer;
            if (peer && !visited.has(peer)) {
              const step = node.userData.isPos ? -12 : 12;
              queue.push({ node: peer, voltage: voltage + step });
            }

            if (this.switchOn) {
              if (node === this.tInPos && !visited.has(this.tOutPos)) queue.push({ node: this.tOutPos, voltage: voltage });
              if (node === this.tOutPos && !visited.has(this.tInPos)) queue.push({ node: this.tInPos, voltage: voltage });
              if (node === this.tInNeg && !visited.has(this.tOutNeg)) queue.push({ node: this.tOutNeg, voltage: voltage });
              if (node === this.tOutNeg && !visited.has(this.tInNeg)) queue.push({ node: this.tInNeg, voltage: voltage });
            }

            this.jumpers.forEach(j => {
              if (j.attachedA === node && j.attachedB && !visited.has(j.attachedB)) queue.push({ node: j.attachedB, voltage: voltage });
              if (j.attachedB === node && j.attachedA && !visited.has(j.attachedA)) queue.push({ node: j.attachedA, voltage: voltage });
            });
          }
        }

        onSelectStart(event) {
          const c = event.target;
          const targets = this._getValidTargets(this.clickables);
          try {
            const hit = xb.core.input.intersectObjectByController(c, targets);
            if (hit && hit.length > 0) {
              const obj = hit[0].object;
              if (obj.userData.isDoor || (obj.parent && obj.parent.userData.isDoor)) {
                this.panelOpen = !this.panelOpen;
                this.panelDoor.rotation.y = this.panelOpen ? -Math.PI / 1.5 : 0;
              } else if (obj.userData.isSwitch || (obj.parent && obj.parent.userData.isSwitch)) {
                this.switchOn = !this.switchOn;
                this.switchLever.rotation.x = this.switchOn ? -Math.PI / 4 : Math.PI / 4;
                this.solveCircuit();
              }
            }
          } catch(e) {}
        }

        onSqueezeStart(event) {
          const c = event.target;
          
          // 1. Check for Jumper Clips (Higher Priority)
          const clips = [];
          this.jumpers.forEach(j => clips.push(j.clipA, j.clipB));
          const validClips = this._getValidTargets(clips);
          try {
            const clipHit = xb.core.input.intersectObjectByController(c, validClips);
            if (clipHit && clipHit.length > 0) {
              const targetClip = clipHit[0].object;
              // Calculate distance to hold clip relative to controller ray
              const dist = c.position.distanceTo(targetClip.getWorldPosition(new THREE.Vector3()));
              this.grabbingClip = { object: targetClip, controller: c, distance: dist };
              
              // Un-anchor clip if connected
              this.jumpers.forEach(j => {
                if (j.clipA === targetClip) j.attachedA = null;
                if (j.clipB === targetClip) j.attachedB = null;
              });
              return;
            }
          } catch(e) {}

          // 2. Check for Equipment Units (Lower Priority)
          const validUnits = this._getValidTargets(this.grabbables);
          try {
            const unitHit = xb.core.input.intersectObjectByController(c, validUnits);
            if (unitHit && unitHit.length > 0) {
              let parent = unitHit[0].object;
              while(parent && !parent.userData.isUnit) parent = parent.parent;
              if (parent) {
                const dist = c.position.distanceTo(unitHit[0].point);
                this.grabbingUnit = { object: parent, controller: c, distance: dist };
              }
            }
          } catch(e) {}
        }

        onSqueezeEnd() {
          // Snap clip to nearest terminal when released
          if (this.grabbingClip) {
            const clip = this.grabbingClip.object;
            let closest = null, minDist = 0.15; // 15cm snap radius
            const validTerminals = this._getValidTargets(this.terminals);
            
            validTerminals.forEach(t => {
              const d = t.getWorldPosition(new THREE.Vector3()).distanceTo(clip.getWorldPosition(new THREE.Vector3()));
              if (d < minDist) { minDist = d; closest = t; }
            });
            
            if (closest) {
              const worldPos = closest.getWorldPosition(new THREE.Vector3());
              clip.parent.worldToLocal(worldPos);
              clip.position.copy(worldPos);
              this.jumpers.forEach(j => {
                if (j.clipA === clip) j.attachedA = closest;
                if (j.clipB === clip) j.attachedB = closest;
              });
            }
            this.grabbingClip = null;
            this.solveCircuit();
          }
          
          this.grabbingUnit = null;
        }

        update() {
          const controllers = xb.core.input.controllers;
          if (!controllers || controllers.length === 0) return;

          // 1. Equipment Unit Grabbing & Room-Scale Placement
          if (this.grabbingUnit) {
            const { object, controller, distance } = this.grabbingUnit;
            
            // Safely select against the AR depth mesh
            let intersection = null;
            if (xb.core.depth && xb.core.depth.depthMesh) {
                try {
                   const hits = xb.core.input.intersectObjectByController(controller, [xb.core.depth.depthMesh]);
                   if (hits && hits.length > 0) intersection = hits[0];
                } catch(e) {}
            }

            if (intersection) {
              // Snap object to real-world floor/table
              object.position.lerp(intersection.point, 0.2);
            } else {
              // Fallback: Float at the held distance in front of the controller
              const targetWorld = controller.localToWorld(new THREE.Vector3(0, 0, -distance));
              object.position.lerp(targetWorld, 0.2);
            }

            // Always maintain upright orientation and face the user
            const lookTarget = xb.core.camera.position.clone();
            lookTarget.y = object.position.y;
            object.lookAt(lookTarget);
          }

          // 2. Controller & Probe Visual Sync
          controllers.forEach(c => {
            const h = c.userData.handedness;
            if (h && this.probes[h]) {
              if (this.probes[h].parent !== c) c.add(this.probes[h]);
            }
          });

          // 3. Jumper Clip Movement
          if (this.grabbingClip) {
            const { object, controller, distance } = this.grabbingClip;
            // Hold the clip firmly at the end of the ray
            const targetWorldPos = controller.localToWorld(new THREE.Vector3(0, 0, -distance));
            object.parent.worldToLocal(targetWorldPos);
            object.position.lerp(targetWorldPos, 0.4);
          }

          // 4. Dynamic Jumper Wires (Prevents wire breaking when units are moved)
          this.jumpers.forEach(j => {
            // Force clips to stick to their attached terminals in world space
            if (j.attachedA) {
              const wA = j.attachedA.getWorldPosition(new THREE.Vector3());
              j.clipA.parent.worldToLocal(wA);
              j.clipA.position.copy(wA);
            }
            if (j.attachedB) {
              const wB = j.attachedB.getWorldPosition(new THREE.Vector3());
              j.clipB.parent.worldToLocal(wB);
              j.clipB.position.copy(wB);
            }

            // Re-draw flexible wire
            const curve = new THREE.CatmullRomCurve3([j.clipA.position.clone(), j.clipB.position.clone()]);
            if (j.tube.geometry) j.tube.geometry.dispose();
            j.tube.geometry = new THREE.TubeGeometry(curve, 10, 0.005, 8, false);
          });

          // 5. Equipment Highlight (Hover glow for grab points)
          const validGrabbables = this._getValidTargets(this.grabbables);
          validGrabbables.forEach(g => { if(g.material) g.material.emissiveIntensity = 0; });
          controllers.forEach(c => {
            try {
              const hover = xb.core.input.intersectObjectByController(c, validGrabbables);
              if (hover && hover.length > 0) {
                const mesh = hover[0].object;
                if (mesh.material) {
                    mesh.material.emissive.set(0xffffff);
                    mesh.material.emissiveIntensity = 0.2;
                }
              }
            } catch(e) {}
          });

          // 6. Physical Multimeter Probing (Distance-based contact, NO raycasting!)
          const activeTerminals = this._getValidTargets(this.terminals);
          activeTerminals.forEach(t => { if(t.material) t.material.emissiveIntensity = 0.1; });

          let negV = null, posV = null;
          
          controllers.forEach(c => {
            const h = c.userData.handedness;
            if (h && this.probes[h]) {
              // Calculate exact world position of the needle tip
              // Center is 0, handle goes backward, needle goes forward to z = -0.185
              const tipWorldPos = this.probes[h].localToWorld(new THREE.Vector3(0, 0, -0.185));
              
              let closestT = null;
              let minDist = 0.06; // 6cm physical contact radius

              activeTerminals.forEach(t => {
                const tWorld = t.getWorldPosition(new THREE.Vector3());
                const dist = tWorld.distanceTo(tipWorldPos);
                if (dist < minDist) {
                  minDist = dist;
                  closestT = t;
                }
              });

              if (closestT) {
                closestT.material.emissiveIntensity = 2.0;
                const v = this.nodeVoltages.get(closestT);
                if (h === 'left') negV = v;
                else if (h === 'right') posV = v;
              }
            }
          });

          // 7. Update Digital Readout
          if (this.meterDisplay) {
            if (negV !== null && posV !== null) {
              this.meterDisplay.setText(`${(posV - negV).toFixed(2)} V`);
            } else if (negV !== null || posV !== null) {
              this.meterDisplay.setText('OPEN');
            } else {
              this.meterDisplay.setText('0.00 V');
            }
          }
        }
      }

      document.addEventListener('DOMContentLoaded', () => {
        const options = new xb.Options();
        options.enableUI(); 
        options.enableReticles();
        options.enableDepth(); // Crucial for AR floor snapping
        
        // Visualize rays to make grabbing across the room easier
        options.controllers.visualizeRays = true;
        
        xb.add(new BatteryLabScript());
        xb.init(options);
      });
    </script>
  </body>
</html>
